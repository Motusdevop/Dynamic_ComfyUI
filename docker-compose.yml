services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dynamiccomfy-api
    env_file:
      - .env
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/dynamiccomfy.db}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-1440}
      - COMFY_BASE_IMAGE=${COMFY_BASE_IMAGE:-comfy-base:latest}
      - ENABLE_GPU=${ENABLE_GPU:-false}
      - SERVER_PUBLIC_HOST=${SERVER_PUBLIC_HOST}
      - PORT_RANGE_START=${PORT_RANGE_START:-8101}
      - PORT_RANGE_END=${PORT_RANGE_END:-8199}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
